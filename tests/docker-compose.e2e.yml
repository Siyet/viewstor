# Viewstor e2e test stack.
#
# Used for manual runs against a stable stack: `docker compose -f tests/docker-compose.e2e.yml up -d`.
# In automated tests the same services are spun up via testcontainers (see src/test/shared/containers.ts).
#
# All external ports are dynamic (`0:<port>`) so the host doesn't clash with local DBs.
# Read the actual mapped ports with `docker compose -f tests/docker-compose.e2e.yml port <service> <internal>`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: viewstor
      POSTGRES_PASSWORD: viewstor
      POSTGRES_DB: viewstor_test
    ports:
      - "0:5432"
    volumes:
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viewstor -d viewstor_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_SKIP_USER_SETUP: 1
    ports:
      - "0:8123"
      - "0:9000"
    volumes:
      - ./seed/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "0:6379"
    volumes:
      - ./seed/redis:/seed:ro
    # The official image has no initdb hook; seed is applied by the test harness
    # (or manually via `docker compose exec redis sh -c "cat /seed/seed.resp | redis-cli --pipe"`).
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 2s
      timeout: 3s
      retries: 30

  kafka:
    image: bitnami/kafka:3.7
    environment:
      # KRaft single-node (no Zookeeper).
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "0:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
