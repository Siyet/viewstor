name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to VS Code Marketplace
        run: |
          npx @vscode/vsce publish --no-git-tag-version 2>&1 | tee /tmp/vsce.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            if grep -q "already exists" /tmp/vsce.log; then
              echo "::warning::Version already published — skipping"
            else
              exit $status
            fi
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Package VSIX
        run: npx @vscode/vsce package --no-git-tag-version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
