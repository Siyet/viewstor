name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Prepare & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare release (version bump, changelog, tag)
        id: prepare
        run: |
          chmod +x .github/scripts/prepare-release.sh
          .github/scripts/prepare-release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & test before publishing ---
      - run: npm run build
      - run: npm test

      # --- Publish to VS Code Marketplace ---
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-git-tag-version
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # --- Package VSIX for GitHub Release ---
      - name: Package VSIX
        run: npx @vscode/vsce package

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          files: '*.vsix'
          generate_release_notes: true
