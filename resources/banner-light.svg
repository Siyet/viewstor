<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="&#39;SF Mono&#39;,&#39;JetBrains Mono&#39;,Menlo,Consolas,monospace">
  <defs>
    <mask id="vmask-l">
      <rect width="900" height="360" fill="white"></rect>
      <path d="M408 100 L450 218 L493 100 L475 100 L450 191 L425 100 Z" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter"></path>
    </mask>
    <linearGradient id="fade-l-l" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="fade-r-l" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"></stop>
    </linearGradient>
    <pattern id="warn-underline-l" x="0" y="0" width="6" height="3" patternUnits="userSpaceOnUse">
      <path d="M0 2 Q 1.5 0 3 2 T 6 2" stroke="#c96a14" stroke-width="1" fill="none"></path>
    </pattern>
  </defs>

  <g font-size="13" opacity="0.98">
    <g fill="#b6bcc4" text-anchor="end">
      <text x="38" y="90">1</text><text x="38" y="112">2</text><text x="38" y="134">3</text>
      <text x="38" y="156">4</text><text x="38" y="178">5</text><text x="38" y="200">6</text>
      <text x="38" y="222">7</text><text x="38" y="244">8</text><text x="38" y="266">9</text>
    </g>
    <line x1="50" y1="74" x2="50" y2="280" stroke="#e4e7eb" stroke-width="1"></line>

    <text x="60" y="90"><tspan fill="#a626a4">SELECT</tspan><tspan fill="#383a42"> c.id, c.name, c.tier,</tspan></text>
    <text x="60" y="112"><tspan fill="#383a42">       </tspan><tspan fill="#c18401">COUNT</tspan><tspan fill="#383a42">(o.id) </tspan><tspan fill="#a626a4">AS</tspan><tspan fill="#383a42"> orders,</tspan></text>
    <text x="60" y="134"><tspan fill="#383a42">       </tspan><tspan fill="#c18401">SUM</tspan><tspan fill="#383a42">(o.total) </tspan><tspan fill="#a626a4">AS</tspan><tspan fill="#383a42"> revenue</tspan></text>
    <text x="60" y="156"><tspan fill="#a626a4">FROM</tspan><tspan fill="#383a42"> customers c</tspan></text>
    <text x="60" y="178"><tspan fill="#a626a4">LEFT JOIN</tspan><tspan fill="#383a42"> orders o </tspan><tspan fill="#a626a4">ON</tspan><tspan fill="#383a42"> o.customer_id = c.id</tspan></text>
    <text x="60" y="200"><tspan fill="#a626a4">WHERE</tspan><tspan fill="#383a42"> </tspan><tspan fill="#c96a14">c.tier</tspan><tspan fill="#383a42"> </tspan><tspan fill="#a626a4">IN</tspan><tspan fill="#383a42"> (</tspan><tspan fill="#50a14f">&#39;pro&#39;</tspan><tspan fill="#383a42">, </tspan><tspan fill="#50a14f">&#39;biz&#39;</tspan><tspan fill="#383a42">)</tspan></text>
    <rect x="107" y="203" width="38" height="3" fill="url(#warn-underline-l)"></rect>
    <text x="60" y="222"><tspan fill="#383a42">  </tspan><tspan fill="#a626a4">AND</tspan><tspan fill="#383a42"> c.created_at &gt;= </tspan><tspan fill="#50a14f">&#39;2026-01-01&#39;</tspan></text>
    <text x="60" y="244"><tspan fill="#a626a4">GROUP BY</tspan><tspan fill="#383a42"> c.id, c.name, c.tier</tspan></text>
    <text x="60" y="266"><tspan fill="#a626a4">ORDER BY</tspan><tspan fill="#383a42"> revenue </tspan><tspan fill="#a626a4">DESC</tspan><tspan fill="#383a42">;</tspan></text>
  </g>

  
  <g transform="translate(205,142)">
