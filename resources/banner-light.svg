<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="&#39;SF Mono&#39;,&#39;JetBrains Mono&#39;,Menlo,Consolas,monospace">
  <defs>
    <mask id="vmask-l">
      <rect width="1200" height="300" fill="white"></rect>
      <path d="M558 73 L600 191 L643 73 L625 73 L600 164 L575 73 Z" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter"></path>
    </mask>
    <linearGradient id="fade-l-l" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="fade-r-l" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"></stop>
    </linearGradient>
  </defs>

  
  <g font-size="13" opacity="0.95">
    <g fill="#b6bcc4" text-anchor="end">
      <text x="52" y="62">1</text><text x="52" y="82">2</text><text x="52" y="102">3</text>
      <text x="52" y="122">4</text><text x="52" y="142">5</text><text x="52" y="162">6</text>
      <text x="52" y="182">7</text><text x="52" y="202">8</text><text x="52" y="222">9</text>
      <text x="52" y="242">10</text>
    </g>
    <line x1="64" y1="44" x2="64" y2="254" stroke="#e4e7eb" stroke-width="1"></line>

    <text x="76" y="62"><tspan fill="#a626a4">SELECT</tspan><tspan fill="#383a42"> c.id, c.name, c.tier,</tspan></text>
    <text x="76" y="82"><tspan fill="#383a42">       </tspan><tspan fill="#c18401">COUNT</tspan><tspan fill="#383a42">(o.id) </tspan><tspan fill="#a626a4">AS</tspan><tspan fill="#383a42"> orders,</tspan></text>
    <text x="76" y="102"><tspan fill="#383a42">       </tspan><tspan fill="#c18401">SUM</tspan><tspan fill="#383a42">(o.total) </tspan><tspan fill="#a626a4">AS</tspan><tspan fill="#383a42"> revenue</tspan></text>
    <text x="76" y="122"><tspan fill="#a626a4">FROM</tspan><tspan fill="#383a42"> customers c</tspan></text>
    <text x="76" y="142"><tspan fill="#a626a4">LEFT JOIN</tspan><tspan fill="#383a42"> orders o </tspan><tspan fill="#a626a4">ON</tspan><tspan fill="#383a42"> o.customer_id = c.id</tspan></text>
    <text x="76" y="162"><tspan fill="#a626a4">WHERE</tspan><tspan fill="#383a42"> c.created_at &gt;= </tspan><tspan fill="#50a14f">&#39;2026-01-01&#39;</tspan></text>
    <text x="76" y="182"><tspan fill="#383a42">  </tspan><tspan fill="#a626a4">AND</tspan><tspan fill="#383a42"> c.tier </tspan><tspan fill="#a626a4">IN</tspan><tspan fill="#383a42"> (</tspan><tspan fill="#50a14f">&#39;pro&#39;</tspan><tspan fill="#383a42">, </tspan><tspan fill="#50a14f">&#39;biz&#39;</tspan><tspan fill="#383a42">)</tspan></text>
    <text x="76" y="202"><tspan fill="#a626a4">GROUP BY</tspan><tspan fill="#383a42"> c.id, c.name, c.tier</tspan></text>
    <text x="76" y="222"><tspan fill="#a626a4">ORDER BY</tspan><tspan fill="#383a42"> revenue </tspan><tspan fill="#a626a4">DESC</tspan></text>
    <text x="76" y="242"><tspan fill="#a626a4">LIMIT</tspan><tspan fill="#383a42"> </tspan><tspan fill="#986801">100</tspan><tspan fill="#383a42">;</tspan></text>
  </g>

  <rect x="0" y="0" width="60" height="300" fill="url(#fade-l-l)"></rect>

  
  <g transform="translate(770,40)">
