<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="&#39;SF Mono&#39;,&#39;JetBrains Mono&#39;,Menlo,Consolas,monospace">
  <defs>
    <mask id="vmask-d">
      <rect width="1200" height="300" fill="white"></rect>
      <path d="M558 73 L600 191 L643 73 L625 73 L600 164 L575 73 Z" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter"></path>
    </mask>
    <linearGradient id="fade-l" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1b1d22" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#1b1d22" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="fade-r" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1b1d22" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#1b1d22" stop-opacity="1"></stop>
    </linearGradient>
  </defs>

  
  <g font-size="13" opacity="0.85">
    <g fill="#3f454f" text-anchor="end">
      <text x="52" y="62">1</text><text x="52" y="82">2</text><text x="52" y="102">3</text>
      <text x="52" y="122">4</text><text x="52" y="142">5</text><text x="52" y="162">6</text>
      <text x="52" y="182">7</text><text x="52" y="202">8</text><text x="52" y="222">9</text>
      <text x="52" y="242">10</text>
    </g>
    <line x1="64" y1="44" x2="64" y2="254" stroke="#2a2e37" stroke-width="1"></line>

    <text x="76" y="62"><tspan fill="#c586c0">SELECT</tspan><tspan fill="#d8dde3"> c.id, c.name, c.tier,</tspan></text>
    <text x="76" y="82"><tspan fill="#d8dde3">       </tspan><tspan fill="#dcdcaa">COUNT</tspan><tspan fill="#d8dde3">(o.id) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#d8dde3"> orders,</tspan></text>
    <text x="76" y="102"><tspan fill="#d8dde3">       </tspan><tspan fill="#dcdcaa">SUM</tspan><tspan fill="#d8dde3">(o.total) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#d8dde3"> revenue</tspan></text>
    <text x="76" y="122"><tspan fill="#c586c0">FROM</tspan><tspan fill="#d8dde3"> customers c</tspan></text>
    <text x="76" y="142"><tspan fill="#c586c0">LEFT JOIN</tspan><tspan fill="#d8dde3"> orders o </tspan><tspan fill="#c586c0">ON</tspan><tspan fill="#d8dde3"> o.customer_id = c.id</tspan></text>
    <text x="76" y="162"><tspan fill="#c586c0">WHERE</tspan><tspan fill="#d8dde3"> c.created_at &gt;= </tspan><tspan fill="#ce9178">&#39;2026-01-01&#39;</tspan></text>
    <text x="76" y="182"><tspan fill="#d8dde3">  </tspan><tspan fill="#c586c0">AND</tspan><tspan fill="#d8dde3"> c.tier </tspan><tspan fill="#c586c0">IN</tspan><tspan fill="#d8dde3"> (</tspan><tspan fill="#ce9178">&#39;pro&#39;</tspan><tspan fill="#d8dde3">, </tspan><tspan fill="#ce9178">&#39;biz&#39;</tspan><tspan fill="#d8dde3">)</tspan></text>
    <text x="76" y="202"><tspan fill="#c586c0">GROUP BY</tspan><tspan fill="#d8dde3"> c.id, c.name, c.tier</tspan></text>
    <text x="76" y="222"><tspan fill="#c586c0">ORDER BY</tspan><tspan fill="#d8dde3"> revenue </tspan><tspan fill="#c586c0">DESC</tspan></text>
    <text x="76" y="242"><tspan fill="#c586c0">LIMIT</tspan><tspan fill="#d8dde3"> </tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#d8dde3">;</tspan></text>
  </g>

  <rect x="0" y="0" width="60" height="300" fill="url(#fade-l)"></rect>

  
