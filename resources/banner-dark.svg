<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="&#39;SF Mono&#39;,&#39;JetBrains Mono&#39;,Menlo,Consolas,monospace">
  <defs>
    <mask id="vmask-d">
      <rect width="900" height="360" fill="white"></rect>
      <path d="M408 100 L450 218 L493 100 L475 100 L450 191 L425 100 Z" fill="black" stroke="black" stroke-width="14" stroke-linejoin="miter"></path>
    </mask>
    <linearGradient id="fade-l" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1b1d22" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#1b1d22" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="fade-r" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1b1d22" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#1b1d22" stop-opacity="1"></stop>
    </linearGradient>
    <pattern id="warn-underline-d" x="0" y="0" width="6" height="3" patternUnits="userSpaceOnUse">
      <path d="M0 2 Q 1.5 0 3 2 T 6 2" stroke="#e5a03a" stroke-width="1" fill="none"></path>
    </pattern>
  </defs>

  <g font-size="13" opacity="0.95">
    <g fill="#3f454f" text-anchor="end">
      <text x="38" y="90">1</text><text x="38" y="112">2</text><text x="38" y="134">3</text>
      <text x="38" y="156">4</text><text x="38" y="178">5</text><text x="38" y="200">6</text>
      <text x="38" y="222">7</text><text x="38" y="244">8</text><text x="38" y="266">9</text>
    </g>
    <line x1="50" y1="74" x2="50" y2="280" stroke="#2a2e37" stroke-width="1"></line>

    <text x="60" y="90"><tspan fill="#c586c0">SELECT</tspan><tspan fill="#d8dde3"> c.id, c.name, c.tier,</tspan></text>
    <text x="60" y="112"><tspan fill="#d8dde3">       </tspan><tspan fill="#dcdcaa">COUNT</tspan><tspan fill="#d8dde3">(o.id) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#d8dde3"> orders,</tspan></text>
    <text x="60" y="134"><tspan fill="#d8dde3">       </tspan><tspan fill="#dcdcaa">SUM</tspan><tspan fill="#d8dde3">(o.total) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#d8dde3"> revenue</tspan></text>
    <text x="60" y="156"><tspan fill="#c586c0">FROM</tspan><tspan fill="#d8dde3"> customers c</tspan></text>
    <text x="60" y="178"><tspan fill="#c586c0">LEFT JOIN</tspan><tspan fill="#d8dde3"> orders o </tspan><tspan fill="#c586c0">ON</tspan><tspan fill="#d8dde3"> o.customer_id = c.id</tspan></text>
    <text x="60" y="200"><tspan fill="#c586c0">WHERE</tspan><tspan fill="#d8dde3"> </tspan><tspan fill="#e5a03a">c.tier</tspan><tspan fill="#d8dde3"> </tspan><tspan fill="#c586c0">IN</tspan><tspan fill="#d8dde3"> (</tspan><tspan fill="#ce9178">&#39;pro&#39;</tspan><tspan fill="#d8dde3">, </tspan><tspan fill="#ce9178">&#39;biz&#39;</tspan><tspan fill="#d8dde3">)</tspan></text>
    
    <rect x="107" y="203" width="38" height="3" fill="url(#warn-underline-d)"></rect>
    <text x="60" y="222"><tspan fill="#d8dde3">  </tspan><tspan fill="#c586c0">AND</tspan><tspan fill="#d8dde3"> c.created_at &gt;= </tspan><tspan fill="#ce9178">&#39;2026-01-01&#39;</tspan></text>
    <text x="60" y="244"><tspan fill="#c586c0">GROUP BY</tspan><tspan fill="#d8dde3"> c.id, c.name, c.tier</tspan></text>
    <text x="60" y="266"><tspan fill="#c586c0">ORDER BY</tspan><tspan fill="#d8dde3"> revenue </tspan><tspan fill="#c586c0">DESC</tspan><tspan fill="#d8dde3">;</tspan></text>
  </g>

  
  <g transform="translate(205,142)">
